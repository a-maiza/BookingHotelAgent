apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: booking-agent-ingress
  namespace: booking-agent
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: booking-agent.example.com  # Replace with your actual domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: booking-agent-service
                port:
                  number: 8080
