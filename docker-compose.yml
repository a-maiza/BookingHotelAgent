services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bookinghotel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bookinghotel
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d bookinghotel"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
